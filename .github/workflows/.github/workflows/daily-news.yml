name: 運送業界 毎朝ニュース配信

on:
  schedule:
    - cron: '0 22 * * *'   # 毎朝7:00 JST
  workflow_dispatch:         # 手動実行ボタン付き

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - name: 運送業ニュース収集 → Discord送信
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python3 << 'EOF'
          import urllib.request
          import xml.etree.ElementTree as ET
          import json
          import os
          from datetime import datetime, timezone, timedelta

          JST = timezone(timedelta(hours=9))
          today = datetime.now(JST).strftime('%Y年%m月%d日')

          QUERIES = [
              '運送業+許可',
              'トラック+運送業+規制',
              '物流+法改正',
              '運送業+行政書士',
          ]

          articles = []
          seen = set()

          for q in QUERIES:
              url = f'https://news.google.com/rss/search?q={urllib.parse.quote(q)}&hl=ja&gl=JP&ceid=JP:ja'
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=10) as r:
                      root = ET.fromstring(r.read())
                  for item in root.findall('.//item')[:3]:
                      title = item.findtext('title', '').strip()
                      link  = item.findtext('link', '').strip()
                      if title and title not in seen:
                          seen.add(title)
                          articles.append({'title': title, 'link': link})
              except Exception as e:
                  print(f'取得エラー: {q} - {e}')

          import urllib.parse  # 上で使っているのでimport位置修正不要

          if not articles:
              lines = [f'**【運送業界ニュース】{today}**', '本日はニュースを取得できませんでした。']
          else:
              lines = [f'**【運送業界ニュース】{today}** :truck:', '']
              for i, a in enumerate(articles[:8], 1):
                  lines.append(f'**{i}.** {a["title"]}')
                  lines.append(f'<{a["link"]}>')
                  lines.append('')
              lines.append('─────────────────')
              lines.append('グローリー行政書士事務所 | 毎朝自動配信')

          payload = json.dumps({'content': '\n'.join(lines)})
          req = urllib.request.Request(
              os.environ['DISCORD_WEBHOOK_URL'],
              data=payload.encode(),
              headers={'Content-Type': 'application/json'},
              method='POST'
          )
          urllib.request.urlopen(req, timeout=10)
          print('Discord送信完了')
          EOF
