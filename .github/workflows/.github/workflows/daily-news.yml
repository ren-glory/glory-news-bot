name: 運送業界 毎朝ニュース配信

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - name: ニュース収集してDiscord送信
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python3 << 'EOF'
          import urllib.request
          import urllib.parse
          import xml.etree.ElementTree as ET
          import json
          import os
          from datetime import datetime, timezone, timedelta

          JST = timezone(timedelta(hours=9))
          today = datetime.now(JST).strftime('%Y年%m月%d日')

          QUERIES = ['運送業 許可', 'トラック 物流 規制', '物流 法改正', '運送業 行政書士']
          MAX_ARTICLES = 8
          DISCORD_LIMIT = 1900  # 余裕を持たせる

          articles = []
          seen_titles = set()
          seen_links = set()

          for q in QUERIES:
              url = 'https://news.google.com/rss/search?q=' + urllib.parse.quote(q) + '&hl=ja&gl=JP&ceid=JP:ja'
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=10) as r:
                      root = ET.fromstring(r.read())

                  for item in root.findall('.//item')[:3]:
                      title = item.findtext('title', '').strip()
                      link = item.findtext('link', '').strip()

                      if not title or not link:
                          continue

                      if title in seen_titles or link in seen_links:
                          continue

                      seen_titles.add(title)
                      seen_links.add(link)
                      articles.append({'title': title, 'link': link})

              except Exception as e:
                  print(f'取得エラー: query={q}, error={e}')

          if not articles:
              lines = [f'**【運送業界ニュース】{today}**', '本日はニュースを取得できませんでした。']
          else:
              lines = [f'**【運送業界ニュース】{today}** :truck:', '']
              for i, a in enumerate(articles[:MAX_ARTICLES], 1):
                  lines.append(f'**{i}.** {a["title"]}')
                  lines.append(f'<{a["link"]}>')
                  lines.append('')
              lines.append('─────────────────')
              lines.append('グローリー行政書士事務所 | 毎朝自動配信')

          content = '\n'.join(lines)

          if len(content) > DISCORD_LIMIT:
              content = content[:DISCORD_LIMIT - 10] + '\n...'

          webhook_url = os.environ.get('DISCORD_WEBHOOK_URL')
          if not webhook_url:
              raise RuntimeError('DISCORD_WEBHOOK_URL が未設定です')

          payload = json.dumps({'content': content}).encode('utf-8')

          req2 = urllib.request.Request(
              webhook_url,
              data=payload,
              headers={'Content-Type': 'application/json'},
              method='POST'
          )

          with urllib.request.urlopen(req2, timeout=10) as res:
              print(f'送信完了 status={res.status}')
          EOF
